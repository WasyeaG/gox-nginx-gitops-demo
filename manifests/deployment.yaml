apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: gox-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: registry.access.redhat.com/ubi9/nginx-122:latest
        command: ["/usr/libexec/s2i/run"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: index
          mountPath: /opt/app-root/src/index.html
          subPath: index.html
      volumes:
      - name: index
        configMap:
          name: nginx-index
